name: Sync jsm.json from qist/tvbox

on:
  schedule:
    # UTC 20:00 = 北京时间凌晨4:00
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download jsm.json
        run: |
          curl -fsSL -o jsm.json https://raw.githubusercontent.com/qist/tvbox/master/jsm.json
          ls -la jsm.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jsm.json
          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit."
          else
            git commit -m "Sync jsm.json from qist/tvbox"
            git pull --rebase origin main
            git push
          fi
