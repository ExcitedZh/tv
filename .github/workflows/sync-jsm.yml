name: Sync jsm.json from qist/tvbox

on:
  schedule:
    # UTC 20:00 = 北京时间凌晨4:00
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download jsm.json
        run: |
          curl -fsSL -o jsm.json https://raw.githubusercontent.com/qist/tvbox/master/jsm.json

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Sync jsm.json from qist/tvbox"
          file_pattern: jsm.json
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"